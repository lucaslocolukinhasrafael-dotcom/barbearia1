name: Deploy to GitHub Pages

on:
  # Dispara o deploy sempre que houver um push na branch "main"
  push:
    branches: ["main"]
  # Permite rodar o deploy manualmente na aba Actions
  workflow_dispatch:

# Permissões necessárias para o GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy ocorra por vez
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build do projeto (Vite)
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Fazer upload dos arquivos gerados (pasta dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
